<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PostCapture | Analytics</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Manrope:wght@600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeInUp 0.4s ease-out forwards; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fbf9f4; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<!-- Login Screen -->
<div id="login-screen" class="w-full max-w-sm">
    <div class="bg-white rounded-xl p-8 shadow-lg border border-gray-100">
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center mx-auto mb-4">
                <span class="material-symbols-outlined text-2xl text-orange-500">lock</span>
            </div>
            <h1 class="text-xl font-bold text-gray-900">PostCapture Analytics</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to view waitlist data</p>
        </div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="login-email" type="email" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition" placeholder="Enter your email"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input id="login-password" type="password" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition" placeholder="Enter your password"/>
            </div>
            <div id="login-error" class="text-sm text-red-600 hidden"></div>
            <button id="login-btn" type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium py-3 rounded-lg transition shadow-sm">
                Sign In
            </button>
        </form>
    </div>
</div>

<!-- Dashboard Screen -->
<div id="dashboard-screen" class="hidden w-full max-w-4xl px-margin-mobile md:px-margin-desktop py-8">
    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-orange-500 text-3xl">camera</span>
            <div>
                <h1 class="text-2xl font-bold text-gray-900">PostCapture Analytics</h1>
                <p class="text-sm text-gray-500">Waitlist signups</p>
            </div>
        </div>
        <button id="logout-btn" class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">
            <span class="material-symbols-outlined text-lg">logout</span>
            Sign Out
        </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm">
            <div class="flex items-center gap-2 text-gray-500 text-sm mb-2">
                <span class="material-symbols-outlined text-lg">people</span>
                Total Signups
            </div>
            <div id="stat-total" class="text-3xl font-bold text-gray-900">--</div>
        </div>
        <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm">
            <div class="flex items-center gap-2 text-gray-500 text-sm mb-2">
                <span class="material-symbols-outlined text-lg">calendar_today</span>
                Today
            </div>
            <div id="stat-today" class="text-3xl font-bold text-gray-900">--</div>
        </div>
        <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm">
            <div class="flex items-center gap-2 text-gray-500 text-sm mb-2">
                <span class="material-symbols-outlined text-lg">schedule</span>
                Latest Signup
            </div>
            <div id="stat-latest" class="text-lg font-medium text-gray-900 truncate">--</div>
        </div>
    </div>

    <!-- Email List -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
            <h2 class="font-semibold text-gray-900">Email List</h2>
            <button id="refresh-btn" class="flex items-center gap-1 text-sm text-orange-500 hover:text-orange-600 transition">
                <span class="material-symbols-outlined text-lg">refresh</span>
                Refresh
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="bg-gray-50 text-left">
                        <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">#</th>
                        <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Source</th>
                        <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Date</th>
                    </tr>
                </thead>
                <tbody id="email-list" class="divide-y divide-gray-50">
                    <tr><td colspan="4" class="px-6 py-12 text-center text-gray-400">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
var token = localStorage.getItem('pc_token');

function checkAuth() {
    if (!token) { showLogin(); return; }
    fetch('/api/auth/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
    }).then(function(r) {
        if (r.ok) { loadDashboard(); } else { localStorage.removeItem('pc_token'); showLogin(); }
    }).catch(function() { showLogin(); });
}

function showLogin() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('dashboard-screen').classList.add('hidden');
}

function showDashboard() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard-screen').classList.remove('hidden');
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var email = document.getElementById('login-email').value;
    var password = document.getElementById('login-password').value;
    var btn = document.getElementById('login-btn');
    var err = document.getElementById('login-error');

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    err.classList.add('hidden');

    try {
        var resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        });
        var data = await resp.json();
        if (resp.ok) {
            localStorage.setItem('pc_token', data.token);
            token = data.token;
            showDashboard();
            loadDashboard();
        } else {
            err.textContent = data.detail || 'Invalid credentials';
            err.classList.remove('hidden');
        }
    } catch (e) {
        err.textContent = 'Connection error';
        err.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
});

async function loadDashboard() {
    try {
        var resp = await fetch('/api/analytics', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!resp.ok) { localStorage.removeItem('pc_token'); showLogin(); return; }
        var data = await resp.json();
        renderStats(data);
        renderList(data.entries);
    } catch (e) {
        console.error(e);
    }
}

function renderStats(data) {
    document.getElementById('stat-total').textContent = data.total;
    var today = new Date().toISOString().slice(0, 10);
    var todayCount = data.entries.filter(function(e) { return e.created_at && e.created_at.startsWith(today); }).length;
    document.getElementById('stat-today').textContent = todayCount;
    var latest = data.entries.length > 0 ? data.entries[data.entries.length - 1] : null;
    document.getElementById('stat-latest').textContent = latest ? latest.email : '--';
}

function renderList(entries) {
    var tbody = document.getElementById('email-list');
    if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-gray-400">No signups yet</td></tr>';
        return;
    }
    tbody.innerHTML = entries.reverse().map(function(e, i) {
        var d = e.created_at ? new Date(e.created_at).toLocaleString() : '--';
        return '<tr class="hover:bg-gray-50"><td class="px-6 py-3 text-sm text-gray-500">' + (entries.length - i) + '</td><td class="px-6 py-3 text-sm font-medium text-gray-900">' + e.email + '</td><td class="px-6 py-3 text-sm text-gray-500">' + e.source + '</td><td class="px-6 py-3 text-sm text-gray-500">' + d + '</td></tr>';
    }).join('');
}

document.getElementById('logout-btn').addEventListener('click', function() {
    localStorage.removeItem('pc_token');
    token = null;
    showLogin();
});

document.getElementById('refresh-btn').addEventListener('click', loadDashboard);

checkAuth();
</script>
</body></html>
