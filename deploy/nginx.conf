server {
    listen 80;
    server_name postcapture.co www.postcapture.co;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.postcapture.co;

    ssl_certificate /etc/letsencrypt/live/postcapture.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/postcapture.co/privkey.pem;

    return 301 https://postcapture.co$request_uri;
}

server {
    listen 443 ssl http2;
    server_name postcapture.co;

    ssl_certificate /etc/letsencrypt/live/postcapture.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/postcapture.co/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    root /opt/postcapture/frontend;
    index waitlist.html;

    access_log /var/log/nginx/postcapture.access.log;
    error_log /var/log/nginx/postcapture.error.log;

    location = / {
        try_files /waitlist.html =404;
    }

    location = /waitlist.html {
        try_files /waitlist.html =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /_next/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
